# 舌象识别分类模型配置文件

# 任务定义
task:
  num_tasks: 15
  task_names:
    - 舌体颜色
    - 舌体特征
    - 舌体形状
    - 齿痕
    - 点刺
    - 裂纹
    - 舌苔特征
    - 滑苔
    - 糙苔
    - 剥落苔
    - 腐苔
    - 腻苔
    - 舌苔颜色
    - 舌尖红
    - 舌尖凹陷
  num_classes:
    - 5   # 舌体颜色: [淡红, 白, 红, 绛, 紫]
    - 2   # 舌体特征: [老, 嫩]
    - 3   # 舌体形状: [胖大, 瘦小, 正常]
    - 2   # 齿痕: [无齿痕, 有齿痕]
    - 2   # 点刺: [无点刺, 有点刺]
    - 2   # 裂纹: [无裂纹, 有裂纹]
    - 3   # 舌苔特征: [舌苔厚, 舌苔薄, 舌苔正常]
    - 2   # 滑苔: [无滑苔, 有滑苔]
    - 2   # 糙苔: [无糙苔, 有糙苔]
    - 2   # 剥落苔: [无剥落苔, 有剥落苔]
    - 2   # 腐苔: [无腐苔, 有腐苔]
    - 2   # 腻苔: [无腻苔, 有腻苔]
    - 4   # 舌苔颜色: [白, 黄, 灰, 黑]
    - 2   # 舌尖红: [无舌尖红, 有舌尖红]
    - 2   # 舌尖凹陷: [无舌尖凹陷, 有舌尖凹陷]
  class_names:
    - ["淡红", "白", "红", "绛", "紫"]
    - ["老", "嫩"]
    - ["胖大", "瘦小", "正常"]
    - ["无齿痕", "有齿痕"]
    - ["无点刺", "有点刺"]
    - ["无裂纹", "有裂纹"]
    - ["舌苔厚", "舌苔薄", "舌苔正常"]
    - ["无滑苔", "有滑苔"]
    - ["无糙苔", "有糙苔"]
    - ["无剥落苔", "有剥落苔"]
    - ["无腐苔", "有腐苔"]
    - ["无腻苔", "有腻苔"]
    - ["白", "黄", "灰", "黑"]
    - ["无舌尖红", "有舌尖红"]
    - ["无舌尖凹陷", "有舌尖凹陷"]

# 数据配置
data:
  image_dir: "images"
  csv_file: "result.csv"
  image_size: 224
  batch_size: 16
  num_workers: 4
  train_ratio: 0.8
  random_seed: 42

# 模型配置
model:
  name: "convnextv2_base.fcmae_ft_in22k_in1k"
  pretrained: true
  dropout: 0.5

# 训练配置
training:
  epochs: 50
  learning_rate: 0.0001
  weight_decay: 0.01
  warmup_epochs: 5
  early_stopping_patience: 10
  save_best: true
  save_freq: 5
  log_freq: 10

# 优化器配置
optimizer:
  name: "AdamW"
  betas: [0.9, 0.999]
  eps: 1.0e-8

# 学习率调度器
scheduler:
  name: "CosineAnnealingLR"
  T_max: 50
  eta_min: 1.0e-7

# 数据增强
augmentation:
  train:
    Resize:
      size: [256, 256]
    RandomResizedCrop:
      size: [224, 224]
      scale: [0.8, 1.0]
    RandomHorizontalFlip:
      p: 0.5
    RandomRotation:
      degrees: 10
    ColorJitter:
      brightness: 0.2
      contrast: 0.2
      saturation: 0.2
      hue: 0.1
    ToTensor: null
    Normalize:
      mean: [0.485, 0.456, 0.406]
      std: [0.229, 0.224, 0.225]
  val:
    Resize:
      size: [224, 224]
    ToTensor: null
    Normalize:
      mean: [0.485, 0.456, 0.406]
      std: [0.229, 0.224, 0.225]

# 路径配置
paths:
  checkpoint_dir: "checkpoints"
  log_dir: "logs"
  output_dir: "outputs"
  analysis_dir: "analysis"
  visualization_dir: "visualization"
